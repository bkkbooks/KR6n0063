  - {type: variant, offset: 6529, length: 76, content: 論曰：若由別道理，依他性得成三＝自【宋】【元】三【大】，自【宋】【元】三自性，此三性云何得不成一也？由別道理故成依他性，不由此成分別及成就。由別道理故成分別，不由此成依他及成就。由別道理故成成就，不由此成依他及分別, 明: ''}
